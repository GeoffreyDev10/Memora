<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Memora - Créez votre album mémorable</title>
    <link rel="stylesheet" href="fstyle.css">
</head>
<body>
    <footer>
    <img class="separation" src="images/Séparation.svg" />

    <!-- Conteneur principal du footer -->
    <div class="footer-content">

        <!-- Première rangée : les deux bulles côte à côte -->
        <div class="footer-row cta-row">
            <div class="rectangle-footer">
                <button class="cta-section">
                    <span class="test">Prêt à créer un album mémorable ? Commencez ici !</span>
                </button>
            </div>
        </div>

        <!-- Deuxième rangée : liens, mentions, droits, etc. -->
        <div class="footer-row links-row">
            <div class="name">Memora</div>
            <button class="mentions">Mentions légales</button>
            <span class="droits">Memora ©2024 - Tous droits réservés</span>
            <button class="confidentialité">Confidentialité</button>
            <div class="language-selector">
                <span class="langue">Français</span>
            </div>
            <div class="rectangle-footer2"> 
                <button class="contact-section">
                    <span class="contact">Des questions ? Contactez-nous ! </span>
                    <img class="questions" src="images/Container.svg" />
                </button>
            </div>
        </div>
    </div>
</footer>


</body>
</html>
